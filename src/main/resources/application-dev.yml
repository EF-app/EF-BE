# 로컬 개발 프로필 — secrets 는 환경변수로 오버라이드 가능.
spring:
  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    url: ${DB_URL:jdbc:mariadb://localhost:3306/ef_db}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:1234}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

logging:
  level:
    com.nokcha.efbe: DEBUG
    org.hibernate.SQL: DEBUG

# dev 기본 JWT secret (운영에서는 절대 사용 금지 — env 로 강제 오버라이드)
jwt:
  secret: ${JWT_SECRET:dev-only-do-not-use-in-prod-please-override-via-env-variable-jwt-secret}

# dev 기본 관리자 비번 (AdminUserInitializer 가 시드 admin 계정 생성에 사용 — 운영에서는 env 강제)
admin:
  password: ${ADMIN_PASSWORD:admin1234}

# dev 더미 R2 엔드포인트 (실제 호출 안 하면 무해 — S3Client 빈 초기화만 가능하도록)
cloud:
  r2:
    region: ${R2_REGION:auto}
    endpoint: ${R2_ENDPOINT:http://localhost:9000}
    access-key: ${R2_ACCESS_KEY:dev-key}
    secret-key: ${R2_SECRET_KEY:dev-secret}
    bucket: ${R2_BUCKET:dev-bucket}
    public-url: ${R2_PUBLIC_URL:http://localhost:9000/dev-bucket}
